<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Clone</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f1f3f6;
}

/* Navbar */

.navbar{
background:#2874f0;
padding:15px;
display:flex;
justify-content:space-around;
align-items:center;
color:white;
position:sticky;
top:0;
}

.logo{
font-size:32px;
font-weight:bold;
}

.search-box input{
width:450px;
padding:10px;
border:none;
border-radius:4px;
}

.nav-buttons button{
padding:10px 20px;
margin-left:10px;
border:none;
background:white;
color:#2874f0;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

/* Categories */

.categories{
display:flex;
justify-content:space-around;
background:white;
padding:20px;
font-weight:bold;
margin-top:5px;
}

.categories div:hover{
color:#2874f0;
cursor:pointer;
}

/* Banner */

.banner{
height:350px;
background:linear-gradient(to right,#2874f0,#00c6ff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

.banner h1{
font-size:60px;
}

.banner p{
font-size:28px;
margin-top:10px;
}

/* Products */

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:30px;
}

.card{
background:white;
width:250px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
transition:0.3s;
text-align:center;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
margin-top:10px;
}

.price{
color:green;
font-size:22px;
margin:10px 0;
}

.card button{
background:#2874f0;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

.card button:hover{
background:#005ce6;
}

/* Footer */

footer{
background:#172337;
color:white;
text-align:center;
padding:30px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- Navbar -->

<div class="navbar">

<div class="logo">
Flipkart
</div>

<div class="search-box">
<input type="text" placeholder="Search for products, brands and more">
</div>

<div class="nav-buttons">
<button onclick="login()">Login</button>
<button onclick="cart()">Cart</button>
</div>

</div>

<!-- Categories -->

<div class="categories">

<div>Mobiles</div>
<div>Fashion</div>
<div>Electronics</div>
<div>Home</div>
<div>Appliances</div>
<div>Travel</div>
<div>Beauty</div>

</div>

<!-- Banner -->

<div class="banner">

<h1>Big Billion Days</h1>

<p>Up to 70% OFF</p>

</div>

<!-- Products -->

<div class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800">

<h3>iPhone 15</h3>

<div class="price">₹79,999</div>

<button onclick="buyNow()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=800">

<h3>Laptop</h3>

<div class="price">₹55,999</div>

<button onclick="buyNow()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800">

<h3>Headphones</h3>

<div class="price">₹1,999</div>

<button onclick="buyNow()">Buy Now</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?q=80&w=800">

<h3>Smart Watch</h3>

<div class="price">₹2,999</div>

<button onclick="buyNow()">Buy Now</button>

</div>

</div>

<!-- Footer -->

<footer>

<h2>Flipkart Clone Website</h2>

<p>Hosted on AWS EC2 using Apache Web Server</p>

</footer>

<script>

function buyNow(){
alert("Product Added Successfully!");
}

function login(){
alert("Login Feature Coming Soon!");
}

function cart(){
alert("Cart is Empty!");
}

</script>

</body>
</html>
