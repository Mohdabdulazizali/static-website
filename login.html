<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#2874f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    background:white;
    width:350px;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.login-container h2{
    text-align:center;
    margin-bottom:20px;
    color:#2874f0;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#2874f0;
    color:white;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

.login-btn:hover{
    background:#005ce6;
}

.register-link{
    text-align:center;
    margin-top:15px;
}

.register-link a{
    text-decoration:none;
    color:#2874f0;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="login-container">

    <h2>Flipkart Login</h2>

    <div class="input-box">
        <input type="email" placeholder="Enter Email">
    </div>

    <div class="input-box">
        <input type="password" placeholder="Enter Password">
    </div>

    <button class="login-btn" onclick="login()">
        Login
    </button>

    <div class="register-link">
        New User?
        <a href="register.html">Register Here</a>
    </div>

</div>

<script>

function login(){

    alert("Login Successful!");

    window.location.href="index.html";

}

</script>

</body>
</html>
